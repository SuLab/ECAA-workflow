schema_version: "0.1"
id: spatial_transcriptomics
version: "1.0.0"
description: |
  Spatially-resolved transcriptomics — Visium, Slide-seq, MERFISH, Xenium,
  Stereo-seq. Standard pipeline: acquire platform-tagged data, preprocess,
  cell-level QC, normalise, dimensionality-reduce, cluster (which the SME
  reads as spatial domains), then test for differential expression
  per-domain. Cell-type deconvolution is bundled into the
  `cell_type_annotation` atom.

  Caveat: dedicated atoms for spatial-domain segmentation and spatially
  variable gene (SVG) discovery don't exist yet — see the README "atoms
  needed" list.
sme_summary: |
  Cluster spots or cells from a spatial transcriptomics slide into spatial
  domains, label each domain with a cell-type composition, and report
  spatially-resolved differential expression.
goal_data: "data:3917"
goal_format: "format:3590"
project_class: bioinformatics
modality_hint: spatial_transcriptomics
atoms:
  - atom_id: data_acquisition
    required: true
  - atom_id: qc_preprocessing
    required: true
    depends_on: [data_acquisition]
  - atom_id: normalisation
    required: true
    depends_on: [qc_preprocessing]
  - atom_id: dimensionality_reduction
    required: true
    depends_on: [normalisation]
  - atom_id: clustering
    required: true
    depends_on: [dimensionality_reduction]
  - atom_id: cell_type_annotation
    required: true
    depends_on: [clustering]
  - atom_id: differential_expression
    required: true
    depends_on: [cell_type_annotation]
  - atom_id: reporting
    required: true
    depends_on: [differential_expression]
  - atom_id: final_reporting
    required: true
    depends_on: [reporting]
slot_mappings:
  platform: data_acquisition.inputs.platform
  organism: data_acquisition.inputs.organism
  samples: data_acquisition.inputs.samples
  reference_atlas: cell_type_annotation.inputs.reference_atlas
claim_boundary: |
  Spatial domains are clusters in expression + coordinate space, not
  anatomical layers. Cell-type deconvolution is reference-relative.
  Report platform, reference atlas, and resolution scale alongside every
  spatial claim. Do not pool platforms (Visium vs MERFISH) into a single
  call without explicit SME direction.
