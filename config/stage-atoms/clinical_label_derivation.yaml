id: clinical_label_derivation
version: "1.0.0"
role: operation
description: |
  Derive ground-truth labels (e.g., Sepsis-3 onset, hospital mortality,
  AKI stage) from raw EHR tables. Canonical derivations come from
  community-maintained code (e.g., mimic-code `sepsis3` table, eICU
  helpers); ICD-only labels are a known failure mode and must be
  rejected by the agent's runtime check. Emits a labeled cohort
  table with one row per (patient, encounter, prediction window)
  and the derived outcome columns + onset timestamps.
edam_operation: "operation:2945"
edam_data: "data:0006"
edam_format: "format:3475"
assignee: agent
depends_on:
  - data_import
expected_artifacts:
  - labeled_cohort.tsv
  - label_derivation_audit.json
  - manifest.json
  - result.json
figure_exempt:
  reason: "Labeled cohort table is a structured intermediate consumed by clinical_feature_extraction; no SME-facing visual at this stage. Cohort-flow diagnostics live in the downstream feature/audit reports."
  category: intermediate
attributes:
  candidate_tools:
    - mimic_code_sepsis3
    - eicu_helpers
    - custom_sql_concepts
resource_profile:
  cpu: moderate
  memory: medium
  gpu: false
  runtime_class: minutes
claim_boundary: |
  Labels are operational definitions derived from EHR signals; they
  are not adjudicated clinical diagnoses. Report the derivation
  source (e.g., mimic-code sepsis3 v3.1) and onset-timestamp
  distribution; ICD-only labels are forbidden as a known failure
  mode for Sepsis-3 prediction.
# Explicit rich ports.
# Inputs are a labeled / imported EHR descriptor (post `data_import`).
# Output is a labeled cohort table with one row per (patient,
# encounter, prediction window) plus derived outcome columns.
inputs:
  - name: imported_ehr_tables
    semantic_type:
      kind: ontology_term
      iri: "data:2531"
      label: "Experiment annotation"
      ontology_version: "EDAM-1.25"
    physical_format:
      iri: "format:3475"
      label: "Tabular text"
    privacy_class: internal
outputs:
  - name: labeled_cohort
    semantic_type:
      kind: local_extension
      namespace: "swfc"
      id: "labeled_cohort"
      proposed_parent_terms:
        - "data:0006"
      definition: "Labeled cohort table for clinical prediction (one row per patient × encounter × prediction window with derived outcome columns and onset timestamps)."
    physical_format:
      iri: "format:3475"
      label: "Tabular text"
    privacy_class: internal
