id: time_series_forecasting
version: "1.0.0"
role: operation
description: |
  Project the fit model out to the target horizon. Emits point forecasts +
  prediction intervals (quantile-wise, conformalized when supported by the
  fit). Pairs with the forecast_ribbon plotting primitive (S14.1) for
  visualization. swfc:time_series_forecast.
edam_operation: "swfc:time_series_forecast"
edam_data: "data:3768"
edam_format: "format:3475"
assignee: agent
depends_on:
  - time_series_model_fitting
plot_stage_id: forecasting_inference
expected_artifacts:
  - forecast.tsv
  - anomalies.tsv
  - manifest.json
  - result.json
required_figures:
  - forecast_ribbon
  - anomaly_timeline
resource_profile:
  cpu: light
  memory: small
  gpu: false
  runtime_class: minutes
# Explicit rich ports.
inputs:
  - name: fitted_model
    semantic_type:
      kind: local_extension
      namespace: "swfc"
      id: "fitted_model"
      proposed_parent_terms:
        - "data:0006"
      definition: "Serialized fit object (ARIMA / ETS / Prophet / NeuralProphet / TimesNet) plus diagnostics."
    physical_format:
      iri: "format:3464"
      label: "JSON"
    privacy_class: internal
  - name: history
    semantic_type:
      kind: local_extension
      namespace: "swfc"
      id: "time_series_data"
      proposed_parent_terms:
        - "data:0006"
      definition: "Numeric time-indexed observations (uni- or multi-variate)."
    physical_format:
      iri: "format:3475"
      label: "Tabular text"
    privacy_class: internal
outputs:
  - name: forecast
    semantic_type:
      kind: local_extension
      namespace: "swfc"
      id: "forecast"
      proposed_parent_terms:
        - "data:0006"
      definition: "Point forecasts plus prediction intervals (quantile-wise, conformalized when supported)."
    physical_format:
      iri: "format:3475"
      label: "Tabular text"
    privacy_class: internal
