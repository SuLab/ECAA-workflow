id: repertoire_diversity
version: "1.0.0"
role: operation
description: |
  Compute repertoire-diversity summary statistics per donor:
  Shannon entropy, clonal-frequency rank distribution, V/J
  gene-segment usage, CDR3 length distribution. For B cells:
  per-donor somatic-hypermutation rate via IMGT comparison.
edam_operation: "operation:3196"
edam_data: "swfc:repertoire_diversity_table"
edam_format: "format:3475"
assignee: agent
depends_on:
  - vdj_reconstruction
expected_artifacts:
  - repertoire_diversity.tsv
  - diversity_summary.json
  - manifest.json
  - result.json
plot_stage_id: vdj_repertoire
required_figures:
  - clonal_frequency_rank
  - v_segment_usage_bar
attributes:
  candidate_tools:
    - alakazam
    - tcrdist3
    - immunarch
resource_profile:
  cpu: light
  memory: small
  gpu: false
  runtime_class: minutes
claim_boundary: |
  Repertoire-diversity statistics are descriptive summaries of
  the sequenced repertoire. They are biased by sampling depth +
  receptor-recovery efficiency + library prep — report depth +
  per-cell yield alongside every diversity number.
inputs:
  - name: per_cell_vdj
    semantic_type:
      kind: local_extension
      namespace: swfc
      id: vdj_per_cell_table
      proposed_parent_terms:
        - "data:3917"
      definition: "Per-cell V(D)J receptor-chain assignment table"
      maturity:
        stage: minted
    physical_format:
      iri: "format:3475"
      label: "Tabular text"
    privacy_class: internal
outputs:
  - name: repertoire_diversity_table
    semantic_type:
      kind: local_extension
      namespace: swfc
      id: repertoire_diversity_table
      proposed_parent_terms:
        - "data:0951"
      definition: "Per-donor repertoire diversity summary: Shannon entropy, V/J usage, CDR3 length distribution"
      maturity:
        stage: minted
    physical_format:
      iri: "format:3475"
      label: "Tabular text"
    statistical_state: "summary"
    privacy_class: internal
