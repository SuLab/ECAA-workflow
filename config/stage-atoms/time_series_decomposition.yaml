id: time_series_decomposition
version: "1.0.0"
role: operation
description: |
  Seasonal-trend decomposition (STL, X-13ARIMA-SEATS, MSTL) on the input
  time series. Emits a three-panel artifact (trend / seasonal / residual)
  the forecast_modeling stage uses to choose model class. ecaax:time_series_
  decomposition; EDAM has no time-series-specific operation node.
edam_operation: "ecaax:time_series_decomposition"
edam_data: "data:3768"
edam_format: "format:3475"
assignee: agent
depends_on:
  - data_acquisition
plot_stage_id: exploratory_analysis
expected_artifacts:
  - decomposition.tsv
  - autocorrelation.tsv
  - manifest.json
  - result.json
required_figures:
  - decomposition_panel
  - acf_pacf_panel
resource_profile:
  cpu: light
  memory: small
  gpu: false
  runtime_class: minutes
# Explicit rich ports.
# EDAM has no time-series-specific data class; use ecaax: local
# extensions parented under data:0006 (Data) so the compatibility
# engine can do open-world subsumption matches.
inputs:
  - name: time_series
    semantic_type:
      kind: local_extension
      namespace: "ecaax"
      id: "time_series_data"
      proposed_parent_terms:
        - "data:0006"
      definition: "Numeric time-indexed observations (uni- or multi-variate)."
    physical_format:
      iri: "format:3475"
      label: "Tabular text"
    privacy_class: internal
outputs:
  - name: decomposition
    semantic_type:
      kind: local_extension
      namespace: "ecaax"
      id: "time_series_decomposition"
      proposed_parent_terms:
        - "data:0006"
      definition: "Trend / seasonal / residual components from STL or X-13ARIMA-SEATS."
    physical_format:
      iri: "format:3475"
      label: "Tabular text"
    privacy_class: internal
