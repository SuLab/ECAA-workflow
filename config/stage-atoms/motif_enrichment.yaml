id: motif_enrichment
version: "1.0.0"
role: operation
description: |
  Identify enriched DNA-binding motifs in a peak set. HOMER
  findMotifsGenome.pl / MEME-ChIP / monaLisa selected at runtime by
  organism + reference. Outputs a ranked motif table (motif id, family,
  p-value, fold enrichment) plus per-peak occurrence calls.
edam_operation: "operation:0238"
edam_data: "data:1364"
edam_format: "format:3475"
assignee: agent
depends_on:
  - peak_calling
plot_stage_id: motif_enrichment
expected_artifacts:
  - enriched_motifs.tsv
  - motif_occurrences.tsv
  - motif_summary.json
  - manifest.json
  - result.json
required_figures:
  - motif_enrichment_table
  - motif_logo_grid
attributes:
  candidate_tools:
    - homer_findmotifsgenome
    - meme_chip
    - monalisa
resource_profile:
  cpu: moderate
  memory: medium
  gpu: false
  runtime_class: minutes
inputs:
  - name: peaks
    semantic_type:
      kind: ontology_term
      iri: "data:1255"
      label: "Feature record"
      ontology_version: "EDAM-1.25"
    physical_format:
      iri: "format:3003"
      label: "BED"
    coordinate_system: "0-based-half-open"
    privacy_class: internal
outputs:
  - name: enriched_motifs
    semantic_type:
      kind: local_extension
      namespace: "ecaax"
      id: "motif_enrichment_results"
      proposed_parent_terms:
        - "data:1364"
        - "data:0951"
      definition: "Ranked motif-enrichment result table with motif identifiers, families, enrichment statistics, and optional consensus sequences."
    physical_format:
      iri: "format:3475"
      label: "TSV"
    privacy_class: internal
