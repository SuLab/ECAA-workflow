id: long_read_benchmarking
version: "1.0.0"
role: validation
description: |
  Cross-platform benchmarking of long-read isoform calls against
  reference annotations (GENCODE, RefSeq) and per-platform truth sets
  (LRGASP, SQANTI3 categories). Emits a category-level confusion matrix
  + per-isoform classification (FSM, ISM, NIC, NNC, etc.) so downstream
  reporting can flag novel isoforms with low support. swfc:isoform_caller_
  concordance.
edam_operation: "swfc:isoform_caller_concordance"
edam_data: "data:0951"
edam_format: "format:3475"
assignee: agent
depends_on:
  - isoform_discovery
resource_profile:
  cpu: moderate
  memory: medium
  gpu: false
  runtime_class: minutes
# Explicit rich ports.
# Decision: the input here is the isoform-call annotation produced by
# isoform_discovery (per the depends_on edge), not the upstream BAM —
# this atom benchmarks the *calls* against reference annotations and
# truth sets, so the isoform GTF is the meaningful input. The output
# is a swfc local extension for the SQANTI3-style category report;
# EDAM data:0951 (statistical estimate) is the closest parent.
inputs:
  - name: isoform_calls
    semantic_type:
      kind: ontology_term
      iri: "data:1276"
      label: "Nucleic acid features"
      ontology_version: "EDAM-1.25"
    physical_format:
      iri: "format:2306"
      label: "GTF"
    modality: "long_read_rnaseq"
    privacy_class: internal
outputs:
  - name: benchmark_report
    semantic_type:
      kind: local_extension
      namespace: "swfc"
      id: "isoform_caller_benchmark_report"
      proposed_parent_terms:
        - "data:0951"
      definition: "Per-isoform category classification (FSM/ISM/NIC/NNC) and confusion-matrix concordance against reference annotations"
    physical_format:
      iri: "format:3475"
      label: "Tabular text"
    modality: "long_read_rnaseq"
    privacy_class: internal
