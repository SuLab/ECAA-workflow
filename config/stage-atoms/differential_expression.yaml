id: differential_expression
version: "1.0.0"
role: operation
description: |
  Test for differentially expressed genes between conditions / cell types.
  DESeq2 / edgeR / limma-voom / MAST / Wilcoxon selected at runtime based on
  modality (bulk vs single-cell) and design.
edam_operation: "operation:3223"
edam_data: "data:3917"
edam_format: "format:3475"
assignee: agent
depends_on:
  - normalisation
expected_artifacts:
  - de_results.tsv
  - de_summary.json
  - manifest.json
  - result.json
required_figures:
  - volcano
  - top_features_heatmap
attributes:
  candidate_tools:
    - deseq2
    - edger
    - limma_voom
    - mast
    - wilcoxon
resource_profile:
  cpu: moderate
  memory: medium
  gpu: false
  runtime_class: minutes
claim_boundary: |
  Differential expression is statistical association, not biological causation.
  Report effect-size + adjusted p-value + the reference factor level for every
  contrast. Avoid mechanistic language; prefer "associated with" / "enriched in"
  over "drives" / "causes".
# Explicit rich ports.
# Input is a normalized count matrix paired with the experimental
# design; output is the DE results table with logFC + p-value + padj.
inputs:
  - name: normalized_counts
    semantic_type:
      kind: ontology_term
      iri: "data:3917"
      label: "Count matrix"
      ontology_version: "EDAM-1.25"
    physical_format:
      iri: "format:3475"
      label: "Tabular text"
    statistical_state: "normalized"
    privacy_class: internal
  - name: experimental_design
    semantic_type:
      kind: ontology_term
      iri: "topic:3678"
      label: "Experimental design and studies"
      ontology_version: "EDAM-1.25"
    physical_format:
      iri: "format:3464"
      label: "JSON"
    privacy_class: internal
outputs:
  - name: de_results
    semantic_type:
      kind: ontology_term
      iri: "data:3134"
      label: "Gene expression data"
      ontology_version: "EDAM-1.25"
    physical_format:
      iri: "format:3475"
      label: "Tabular text"
    units: "log2 fold change"
    statistical_state: "de_tested"
    privacy_class: internal
