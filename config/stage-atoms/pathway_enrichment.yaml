id: pathway_enrichment
version: "1.0.0"
role: operation
description: |
  Test pre-defined gene sets (KEGG / Reactome / GO / MSigDB hallmark) against
  ranked DE results. fgsea / clusterProfiler / GSEA / enrichr selected at runtime.
edam_operation: "operation:2436"
edam_data: "data:0951"
edam_format: "format:3475"
assignee: agent
depends_on:
  - differential_expression
plot_stage_id: biological_interpretation
expected_artifacts:
  - pathway_results.tsv
  - pathway_summary.json
  - manifest.json
  - result.json
required_figures:
  - top_enriched_terms
attributes:
  candidate_tools:
    - fgsea
    - clusterprofiler
    - gsea
    - enrichr
  candidate_databases:
    - kegg
    - reactome
    - go_bp
    - go_mf
    - go_cc
    - msigdb_hallmark
resource_profile:
  cpu: light
  memory: small
  gpu: false
  runtime_class: minutes
claim_boundary: |
  Enrichment is a statistical signal that a gene set is over-represented at
  the top / bottom of a ranked list. It does not establish that the pathway
  is biologically activated or repressed in the experimental system.
# Explicit rich ports.
# Consumes a DE-ranked gene table; emits a per-pathway enrichment
# table with NES + p-value + adjusted p-value.
inputs:
  - name: ranked_de_results
    semantic_type:
      kind: ontology_term
      iri: "data:0951"
      label: "Statistical estimate score"
      ontology_version: "EDAM-1.25"
    physical_format:
      iri: "format:3475"
      label: "Tabular text"
    statistical_state: "de_tested"
    privacy_class: internal
outputs:
  - name: pathway_results
    semantic_type:
      kind: ontology_term
      iri: "data:0960"
      label: "Pathway"
      ontology_version: "EDAM-1.25"
    physical_format:
      iri: "format:3475"
      label: "Tabular text"
    statistical_state: "multiple_testing_corrected"
    privacy_class: internal
