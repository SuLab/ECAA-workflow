id: cdisc_mapping
version: "1.0.0"
role: operation
description: |
  Map clinical-trial source data (eCRF + raw lab + central-lab feeds) to CDISC
  SDTM domains (DM, LB, AE, EX, etc.) per the trial's SAP-referenced data
  dictionary. Consumes raw clinical data; emits a SDTM-conformant table set
  the population_definition stage downstream consumes. ecaax:cdisc_mapping
  because EDAM has no operation node for CDISC SDTM mapping today.
edam_operation: "ecaax:cdisc_mapping"
edam_data: "data:2531"
edam_format: "format:3475"
assignee: agent
depends_on:
  - data_acquisition
resource_profile:
  cpu: light
  memory: small
  gpu: false
  runtime_class: minutes
# Explicit rich ports.
# Clinical-trial source-to-CDISC mapping: consumes raw eCRF + lab
# feeds; emits a CDISC SDTM/ADaM dataset bundle. Subject-level
# fields propagate as PHI; downstream population_definition reads
# this bundle.
inputs:
  - name: source_clinical_data
    semantic_type:
      kind: ontology_term
      iri: "data:2531"
      label: "Patient data"
      ontology_version: "EDAM-1.25"
    physical_format:
      iri: "format:3475"
      label: "Tabular text"
    privacy_class: phi
outputs:
  - name: cdisc_datasets
    semantic_type:
      kind: local_extension
      namespace: "ecaax"
      id: "cdisc_dataset"
      proposed_parent_terms:
        - "data:2531"
      definition: "CDISC SDTM/ADaM-conformant dataset bundle (DM, LB, AE, EX, ADSL, ADAE, etc.)"
    physical_format:
      iri: "format:3475"
      label: "Tabular text"
    privacy_class: phi
