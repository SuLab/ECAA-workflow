id: clinical_safety_summary
version: "1.0.0"
role: operation
description: |
  Produce the safety section of the trial report: adverse-event (AE)
  summary tables, SAE breakdown by MedDRA SOC / preferred term,
  discontinuation summaries, lab-shift tables, and exposure-adjusted
  rates. Reads the imported CDISC ADaM / SDTM safety domains
  (ADAE, ADLB, ADCM, ADEX). Method-neutral over the tabulation
  tooling — typical implementations use R `tidytlg` / `pharmaverse`
  packages or SAS `proc freq` / `proc tabulate`. Emits a structured
  per-section table consumed by the trial report.
edam_operation: "operation:3501"
edam_data: "data:0951"
edam_format: "format:3475"
assignee: agent
depends_on:
  - data_import
expected_artifacts:
  - ae_summary.tsv
  - sae_breakdown.tsv
  - discontinuation_summary.tsv
  - safety_summary.json
  - manifest.json
  - result.json
figure_exempt:
  reason: "Tabulated AE / SAE / discontinuation summary is a structured intermediate consumed by reporting. SME-facing safety visuals (e.g., AE incidence bar charts) are assembled by the downstream reporting atom."
  category: intermediate
attributes:
  candidate_tools:
    - r_tidytlg
    - r_pharmaverse
    - sas_proc_freq
    - sas_proc_tabulate
    - python_pandas_tabulate
resource_profile:
  cpu: light
  memory: small
  gpu: false
  runtime_class: minutes
claim_boundary: |
  Safety tables are descriptive counts + exposure-adjusted rates
  computed against the SAP-named safety population. Report the AE
  coding dictionary version (MedDRA release), the exposure-day
  denominator definition, and the analysis-set inclusion criteria.
  Do not assert causal attribution between treatment and adverse
  events beyond what the SAP specifies; do not generate regulatory
  signals.
# Explicit rich ports.
# Input is the imported CDISC ADaM / SDTM tabular dataset produced by
# `data_import` (specifically the ADAE / ADLB / ADCM / ADEX safety
# domains). Output is a structured per-section safety summary
# consumed by reporting.
inputs:
  - name: imported_trial_dataset
    semantic_type:
      kind: ontology_term
      iri: "data:2531"
      label: "Experiment annotation"
      ontology_version: "EDAM-1.25"
    physical_format:
      iri: "format:3475"
      label: "Tabular text"
    privacy_class: internal
outputs:
  - name: safety_summary
    semantic_type:
      kind: local_extension
      namespace: "swfc"
      id: "clinical_safety_summary"
      proposed_parent_terms:
        - "data:0951"
      definition: "AE / SAE / discontinuation summary tables with exposure-adjusted rates over the SAP-named safety analysis population."
    physical_format:
      iri: "format:3475"
      label: "Tabular text"
    privacy_class: internal
