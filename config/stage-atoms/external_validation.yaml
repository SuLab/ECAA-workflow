id: external_validation
version: "1.0.0"
role: validation
description: |
  Re-evaluate a trained predictive model on a holdout external cohort
  (e.g., eICU-CRD when the model was trained on MIMIC-IV). Repeats
  label derivation, feature extraction, and prediction generation
  using the SAME pipeline contracts as the internal pass, then scores
  the model's predictions against the external cohort's labels.
  Emits AUROC, AUPRC, calibration, fairness metrics plus a transport
  diagnostic (feature-distribution shift, label-prevalence shift)
  so SMEs see whether degradation is statistical drop or distribution
  shift. External AUROC is expected to drop 0.05-0.15 relative to
  internal validation; this is not interpreted as model failure
  absent other signals.
edam_operation: "operation:3659"
edam_data: "data:0951"
edam_format: "format:3475"
assignee: agent
depends_on:
  - predictive_model_fit
expected_artifacts:
  - external_validation_report.json
  - external_predictions.tsv
  - distribution_shift_audit.json
  - manifest.json
  - result.json
figure_exempt:
  reason: "External-cohort validation emits AUROC / AUPRC / calibration / distribution-shift JSON consumed by the downstream reporting atom; the validation stage itself does not commit an SME-facing figure."
  category: non_plottable
attributes:
  candidate_tools:
    - sklearn_metrics
    - custom_external_scorer
resource_profile:
  cpu: moderate
  memory: large
  gpu: false
  runtime_class: hours
claim_boundary: |
  Report external-cohort discrimination + calibration + subgroup
  metrics verbatim against the labels derived by the same pipeline.
  An external AUROC drop of 0.05-0.15 relative to internal validation
  is the expected baseline; do not declare model failure on that
  basis alone. Report the distribution-shift diagnostics alongside
  the discrimination numbers.
# Explicit rich ports.
# Inputs: the trained model artifact + a separate external-cohort
# descriptor supplied via the data_import slot (the v4 composer's
# upstream binds the external descriptor when the SME registers a
# separate holdout dataset). Output: external-validation report.
inputs:
  - name: trained_model
    semantic_type:
      kind: local_extension
      namespace: "ecaax"
      id: "predictive_model_artifact"
      proposed_parent_terms:
        - "data:0006"
      definition: "Serialized trained predictive model."
    physical_format:
      iri: "format:3464"
      label: "JSON"
    privacy_class: internal
  - name: external_cohort_descriptor
    semantic_type:
      kind: local_extension
      namespace: "ecaax"
      id: "dataset_descriptor"
      proposed_parent_terms:
        - "data:2531"
      definition: "SME-declared external holdout cohort descriptor (path, format, label)."
    privacy_class: internal
outputs:
  - name: external_validation_report
    semantic_type:
      kind: local_extension
      namespace: "ecaax"
      id: "external_validation_report"
      proposed_parent_terms:
        - "data:0951"
      definition: "External-cohort discrimination + calibration + subgroup metrics + distribution-shift diagnostics."
    physical_format:
      iri: "format:3464"
      label: "JSON"
    privacy_class: internal
