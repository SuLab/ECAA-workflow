id: spatial_domain_segmentation
version: "1.0.0"
role: operation
description: |
  Segment a spatial-transcriptomics tissue section into regions of similar
  expression profile. Method choice deferred to discover_* (BANKSY, BayesSpace,
  Squidpy spatial neighbors, GraphST). Emits per-spot region label + adjacency
  graph that downstream neighborhood-enrichment stages consume.
  ecaax:spatial_clustering — EDAM clusters at operation:3432 but spatial
  modality has additional graph-aware constraints.
edam_operation: "ecaax:spatial_clustering"
edam_data: "ecaax:spatial_coordinates"
edam_format: "format:3590"
assignee: agent
depends_on:
  - qc_preprocessing
plot_stage_id: spatial_clustering
expected_artifacts:
  - spatial_domains.tsv
  - adjacency_graph.json
  - manifest.json
  - result.json
required_figures:
  - tissue_overlay
  - neighborhood_enrichment
attributes:
  candidate_tools: [banksy, bayesspace, squidpy_neighbors, graphst]
method_choice:
  deferred_to: discover_spatial_clustering_method
resource_profile:
  cpu: heavy
  memory: large
  gpu: false
  runtime_class: minutes
# Explicit rich ports.
# Spatial transcriptomics object (AnnData / SpatialData) carrying
# per-spot expression + xy/xyz coordinates. EDAM has no first-class
# class for this; carried as a ecaax:spatial_object local extension
# proposing data:3917 (count matrix) as parent.
inputs:
  - name: spatial_object
    semantic_type:
      kind: local_extension
      namespace: "ecaax"
      id: "spatial_object"
      proposed_parent_terms:
        - "data:3917"
      definition: "Spatial transcriptomics object (AnnData/SpatialData) with per-spot counts and tissue coordinates"
    physical_format:
      iri: "format:3590"
      label: "HDF5"
    modality: "spatial_transcriptomics"
    privacy_class: internal
outputs:
  - name: spatial_domains
    semantic_type:
      kind: local_extension
      namespace: "ecaax"
      id: "spatial_domains"
      proposed_parent_terms:
        - "data:3917"
      definition: "Per-spot spatial-domain labels plus adjacency graph"
    physical_format:
      iri: "format:3475"
      label: "Tabular text"
    modality: "spatial_transcriptomics"
    privacy_class: internal
