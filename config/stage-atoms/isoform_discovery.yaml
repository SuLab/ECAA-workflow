id: isoform_discovery
version: "1.0.0"
role: operation
description: |
  Identify novel and known isoforms from long-read RNA-seq alignments
  (FLAIR, IsoQuant, TALON, Bambu). Method choice deferred to discover_*.
  Emits a transcriptome-extended GTF + per-isoform read counts the
  downstream differential_transcript_usage atom consumes.
  swfc:long_read_isoform_calling — extends EDAM operation:3563 (RNA-Seq
  read count analysis) into the isoform-resolved long-read axis.
edam_operation: "swfc:long_read_isoform_calling"
edam_data: "data:1276"
edam_format: "format:2306"
assignee: agent
depends_on:
  - alignment
plot_stage_id: isoform_calling
expected_artifacts:
  - isoforms.gtf
  - isoform_counts.tsv
  - manifest.json
  - result.json
required_figures:
  - isoform_structure
  - sashimi
attributes:
  candidate_tools: [flair, isoquant, talon, bambu]
method_choice:
  deferred_to: discover_isoform_caller
resource_profile:
  cpu: heavy
  memory: large
  gpu: false
  runtime_class: hours
# Explicit rich ports.
# Long-read modality flag flows through both ports so the compatibility
# engine refuses to wire short-read alignments into a long-read isoform
# caller. The output is a transcriptome-extended annotation in GTF
# (EDAM format:2306, the GFF family) plus an accompanying tabular
# isoform_counts side artifact captured at the differential_transcript_
# usage atom's input port.
inputs:
  - name: long_read_alignments
    semantic_type:
      kind: ontology_term
      iri: "data:0863"
      label: "Sequence alignment"
      ontology_version: "EDAM-1.25"
    physical_format:
      iri: "format:2572"
      label: "BAM"
    modality: "long_read_rnaseq"
    privacy_class: internal
outputs:
  - name: novel_transcripts
    semantic_type:
      kind: ontology_term
      iri: "data:1276"
      label: "Nucleic acid features"
      ontology_version: "EDAM-1.25"
    physical_format:
      iri: "format:2306"
      label: "GTF"
    modality: "long_read_rnaseq"
    privacy_class: internal
