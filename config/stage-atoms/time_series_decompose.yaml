id: time_series_decompose
version: "1.0.0"
role: operation
description: |
  Decompose a time-series panel into trend / seasonality / residual
  components and run stationarity diagnostics. Method-neutral: the
  concrete decomposition (STL, classical additive/multiplicative,
  X-13ARIMA-SEATS) is selected at runtime by the agent. Closes
  Phase 6.1 B.1 of the dag-design-v3-v4-100-percent-closure plan —
  the time_series_forecast archetype previously had no producer for
  this stage and dispatch failed with GoalUnreachable.
edam_operation: "operation:3658"
edam_data: "data:3134"
edam_format: "format:3475"
assignee: agent
depends_on:
  - data_import
resource_profile:
  cpu: moderate
  memory: medium
  gpu: false
  runtime_class: minutes
# Figure-obligation exemption — the decomposition stage emits
# intermediate component tables (trend/seasonal/residual). These
# are not registered in plot-affordances/registered.yaml because
# they're pipeline intermediates consumed by the downstream
# model_fit atom, not SME-facing figures. The forecast-evaluate
# atom produces the user-facing data:0951 figure.
figure_exempt:
  reason: "Intermediate component tables (trend/seasonal/residual) consumed by the downstream model_fit atom; not an SME-facing figure."
  category: intermediate
inputs:
  - name: panel
    semantic_type:
      kind: ontology_term
      iri: "data:3134"
      label: "Gene expression matrix"
      ontology_version: "EDAM-1.25"
    physical_format:
      iri: "format:3475"
      label: "Tabular text"
    privacy_class: internal
outputs:
  - name: decomposed_components
    semantic_type:
      kind: ontology_term
      iri: "data:3134"
      label: "Gene expression matrix"
      ontology_version: "EDAM-1.25"
    physical_format:
      iri: "format:3475"
      label: "Tabular text"
    privacy_class: internal
