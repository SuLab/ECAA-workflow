id: vdj_reconstruction
version: "1.0.0"
role: operation
description: |
  Reconstruct productive T-cell-receptor (TRA/TRB) or B-cell-receptor
  (IGH/IGK/IGL) contig pairs per cell from single-cell V(D)J library
  reads. Cell Ranger V(D)J / BD Rhapsody V(D)J / MiXCR-single-cell /
  Immcantation at runtime. Output is a per-cell receptor-chain
  assignment table (productive only by default).
edam_operation: "operation:3197"
edam_data: "data:3917"
edam_format: "format:3475"
assignee: agent
depends_on:
  - data_acquisition
expected_artifacts:
  - per_cell_vdj.tsv
  - vdj_summary.json
  - manifest.json
  - result.json
plot_stage_id: vdj_repertoire
required_figures:
  - chain_assignment_per_cell_bar
  - cdr3_length_distribution
attributes:
  candidate_tools:
    - cellranger_vdj
    - bd_rhapsody_vdj
    - mixcr_singlecell
    - immcantation_changeo
resource_profile:
  cpu: moderate
  memory: medium
  gpu: false
  runtime_class: hours
claim_boundary: |
  V(D)J reconstruction yields per-cell receptor sequences via
  contig assembly + IMGT alignment. Productive-only filtering
  drops cells with stop codons or out-of-frame junctions. The
  per-cell barcode-to-clonotype mapping has the same reliability
  caveats as the upstream cell-barcoding step.
inputs:
  - name: vdj_library_reads
    semantic_type:
      kind: ontology_term
      iri: "data:2044"
      label: "Sequence"
      ontology_version: "EDAM-1.25"
    physical_format:
      iri: "format:1930"
      label: "FASTQ"
    privacy_class: internal
outputs:
  - name: per_cell_vdj
    semantic_type:
      kind: local_extension
      namespace: ecaax
      id: vdj_per_cell_table
      proposed_parent_terms:
        - "data:3917"
      definition: "Per-cell V(D)J receptor-chain assignment table"
      maturity:
        stage: minted
    physical_format:
      iri: "format:3475"
      label: "Tabular text"
    privacy_class: internal
