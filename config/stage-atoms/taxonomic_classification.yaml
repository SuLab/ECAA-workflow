id: taxonomic_classification
version: "1.0.0"
role: operation
description: |
  Assign taxonomic identities to metagenomic reads or contigs. Kraken2 /
  MetaPhlAn / QIIME2 (DADA2 / Deblur) / Bracken selected at runtime by
  modality (shotgun vs amplicon).
edam_operation: "operation:3460"
edam_data: "data:1234"
edam_format: "format:3475"
assignee: agent
depends_on:
  - sequence_trimming
plot_stage_id: taxonomic_profiling
expected_artifacts:
  - taxonomic_profile.tsv
  - manifest.json
  - result.json
required_figures:
  - taxonomic_stacked_bar
attributes:
  candidate_tools:
    - kraken2
    - metaphlan
    - qiime2_dada2
    - qiime2_deblur
    - bracken
    - centrifuge
resource_profile:
  cpu: heavy
  memory: large
  gpu: false
  runtime_class: hours
# Explicit rich ports.
# Metagenomics: consumes trimmed reads (or assembled contigs); emits
# a taxonomic-profile table with one row per assigned taxon.
inputs:
  - name: reads_or_contigs
    semantic_type:
      kind: ontology_term
      iri: "data:2044"
      label: "Sequence reads"
      ontology_version: "EDAM-1.25"
    physical_format:
      iri: "format:1930"
      label: "FASTQ"
    modality: "metagenomics"
    privacy_class: internal
outputs:
  - name: taxonomic_assignments
    semantic_type:
      kind: ontology_term
      iri: "data:3028"
      label: "Taxonomy"
      ontology_version: "EDAM-1.25"
    physical_format:
      iri: "format:3475"
      label: "Tabular text"
    modality: "metagenomics"
    privacy_class: internal
