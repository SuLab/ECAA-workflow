id: biomni_eval1_query
version: "1.0.0"
role: operation
description: |
  Answer one Biomni-Eval1 instance. Spans 10 task classes
  (rare_disease_diagnosis, gwas_target_identification,
  drug_target_interaction, etc.); 433 instances total. Scoring
  goes through `biomni.eval.BiomniEval1.evaluate(...)` via a
  Python subprocess bridge owned by the eval adapter (NOT PyO3
  — JSON-over-stdin/stdout to keep biomni env drift independent
  of the host build).
edam_operation: "ecaax:biomni_eval1_query"
assignee: agent
preferred_container:
  image: "ghcr.io/scripps/bio-min"
  tag: "v0.1.0-eval"
resource_profile:
  cpu: moderate
  memory: medium
  gpu: false
  runtime_class: minutes
safety:
  level: network
  network:
    kind: bridge
# Explicit rich ports.
# LLM eval-bench atoms model the query / response / score triple as
# ecaax: local extensions parented under EDAM data classes so the
# composer can route them through the open-world subsumption check.
figure_exempt:
  reason: "Benchmark evaluation atom; structured eval score output does not map to a visual figure type."
  category: non_plottable
inputs:
  - name: query
    semantic_type:
      kind: local_extension
      namespace: "ecaax"
      id: "llm_query"
      proposed_parent_terms:
        - "data:0006"
      definition: "Biomni-Eval1 instance prompt (one of 433 across 10 task classes)."
    physical_format:
      iri: "format:3464"
      label: "JSON"
    privacy_class: public
outputs:
  - name: response
    semantic_type:
      kind: local_extension
      namespace: "ecaax"
      id: "llm_response"
      proposed_parent_terms:
        - "data:2526"
      definition: "Agent response to the eval-bench query."
    physical_format:
      iri: "format:3464"
      label: "JSON"
    privacy_class: public
  - name: score
    semantic_type:
      kind: local_extension
      namespace: "ecaax"
      id: "eval_score"
      proposed_parent_terms:
        - "data:0951"
      definition: "Biomni.eval.BiomniEval1.evaluate(...) score for this instance."
    physical_format:
      iri: "format:3464"
      label: "JSON"
    privacy_class: public
