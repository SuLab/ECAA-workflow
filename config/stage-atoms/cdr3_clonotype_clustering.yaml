id: cdr3_clonotype_clustering
version: "1.0.0"
role: operation
description: |
  Cluster CDR3 amino-acid sequences across donors to detect public
  clonotypes (shared TCR/BCR sequences across individuals,
  potentially antigen-responsive). TCRdist3 / GLIPH2 for T cells;
  SCOPer / Immcantation for B-cell SHM-aware clustering.
edam_operation: "operation:3197"
edam_data: "swfc:clonotype_table"
edam_format: "format:3475"
assignee: agent
depends_on:
  - vdj_reconstruction
expected_artifacts:
  - clonotype_clusters.tsv
  - public_clonotypes.tsv
  - clustering_summary.json
  - manifest.json
  - result.json
plot_stage_id: vdj_repertoire
required_figures:
  - public_clonotype_size_bar
  - clonotype_network
attributes:
  candidate_tools:
    - tcrdist3
    - gliph2
    - scoper
    - immcantation
resource_profile:
  cpu: moderate
  memory: medium
  gpu: false
  runtime_class: minutes
claim_boundary: |
  Public-clonotype identification is statistical similarity in
  CDR3 amino-acid space. It does not directly establish antigen
  reactivity — orthogonal evidence (tetramer staining, functional
  assays) is required before any antigen-specificity claim.
inputs:
  - name: per_cell_vdj
    semantic_type:
      kind: local_extension
      namespace: swfc
      id: vdj_per_cell_table
      proposed_parent_terms:
        - "data:3917"
      definition: "Per-cell V(D)J receptor-chain assignment table"
      maturity:
        stage: minted
    physical_format:
      iri: "format:3475"
      label: "Tabular text"
    privacy_class: internal
outputs:
  - name: clonotype_clusters
    semantic_type:
      kind: local_extension
      namespace: swfc
      id: clonotype_table
      proposed_parent_terms:
        - "data:0951"
      definition: "CDR3-clustered clonotype table with per-donor public clonotype assignments"
      maturity:
        stage: minted
    physical_format:
      iri: "format:3475"
      label: "Tabular text"
    statistical_state: "clustered"
    privacy_class: internal
