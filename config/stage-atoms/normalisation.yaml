id: normalisation
version: "1.0.0"
role: operation
description: |
  Standardise expression values to remove library-size and composition biases.
  Method neutrality: DESeq2 VST / edgeR TMM / scran pooling / Seurat
  LogNormalize / scnorm / sctransform are selected at runtime.
edam_operation: "operation:3435"
edam_data: "data:3917"
edam_format: "format:3475"
assignee: agent
depends_on:
  - qc_preprocessing
plot_stage_id: normalization
expected_artifacts:
  - normalized_counts_index.json
  - hvg_list.tsv
  - manifest.json
  - result.json
required_figures:
  - mean_variance
  - hvg_count_bar
attributes:
  candidate_tools:
    - deseq2_vst
    - edger_tmm
    - scran
    - seurat_lognormalize
    - sctransform
resource_profile:
  cpu: moderate
  memory: medium
  gpu: false
  runtime_class: minutes
# Explicit rich ports.
# Input is the (filtered) raw count matrix; output is the normalized
# count matrix. The concrete normalization_state value is set by the
# runtime-selected method (vst | tmm | log_normalize | sctransform);
# leaving it as the generic "normalized" tag keeps the atom method-
# neutral while still flagging "values transformed since raw" to the
# compatibility engine.
inputs:
  - name: count_matrix
    semantic_type:
      kind: ontology_term
      iri: "data:3917"
      label: "Count matrix"
      ontology_version: "EDAM-1.25"
    physical_format:
      iri: "format:3475"
      label: "Tabular text"
    statistical_state: "raw_counts"
    privacy_class: internal
outputs:
  - name: normalized_counts
    semantic_type:
      kind: ontology_term
      iri: "data:3917"
      label: "Count matrix"
      ontology_version: "EDAM-1.25"
    physical_format:
      iri: "format:3475"
      label: "Tabular text"
    statistical_state: "normalized"
    normalization_state: "normalized"
    privacy_class: internal
