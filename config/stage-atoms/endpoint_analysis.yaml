id: endpoint_analysis
version: "1.0.0"
role: operation
description: |
  Evaluate the SAP-named primary or secondary endpoint estimand on the
  configured analysis population. Hands off to a method-specific runner
  (MMRM, CMH, KM, Cox, Poisson, etc.) chosen by the SAP — ecaax:trial_
  primary_endpoint as the umbrella; the discover_* method choice is
  resolved at runtime by the agent. Emits one summary table per
  comparison + the model object for sensitivity follow-up.
edam_operation: "ecaax:trial_primary_endpoint"
edam_data: "ecaax:trial_endpoint"
edam_format: "format:3475"
assignee: agent
depends_on:
  - population_definition
plot_stage_id: primary_endpoint
expected_artifacts:
  - endpoint_results.tsv
  - model_summary.json
  - manifest.json
  - result.json
required_figures:
  - forest
attributes:
  estimand_required: true
resource_profile:
  cpu: moderate
  memory: small
  gpu: false
  runtime_class: minutes
# Explicit rich ports.
# Clinical-trial endpoint analysis: consumes per-arm endpoint data
# joined to the analysis populations; emits per-endpoint test
# results. PHI throughout — subject-level fields propagate.
inputs:
  - name: per_arm_endpoint_data
    semantic_type:
      kind: local_extension
      namespace: "ecaax"
      id: "trial_endpoint"
      proposed_parent_terms:
        - "data:2048"
      definition: "Per-subject × visit endpoint observations on the analysis population"
    physical_format:
      iri: "format:3475"
      label: "Tabular text"
    privacy_class: phi
outputs:
  - name: endpoint_test_results
    semantic_type:
      kind: local_extension
      namespace: "ecaax"
      id: "trial_endpoint"
      proposed_parent_terms:
        - "data:0951"
      definition: "Primary endpoint test results: per-comparison estimate, CI, and p-value (time-to-event / MMRM / CMH / Cox / Poisson as selected by SAP)"
    physical_format:
      iri: "format:3475"
      label: "Tabular text"
    statistical_state: "de_tested"
    privacy_class: internal
