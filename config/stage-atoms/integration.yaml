id: integration
version: "1.0.0"
role: aggregator
description: |
  Sensitivity comparison across batch-correction methods (Harmony / scVI /
  BBKNN / Scanorama). Materialises method-vs-method concordance metrics so
  the SME can pick a winner via `select_sensitivity_winner`. Aggregator role
  because it fans in multiple corrected matrices.
edam_operation: "swfc:integration_method_comparison"
edam_data: "data:3917"
edam_format: "format:3475"
assignee: agent
depends_on:
  - batch_correction
resource_profile:
  cpu: moderate
  memory: medium
  gpu: false
  runtime_class: minutes
# Explicit rich ports.
# Aggregator atom: fans in multiple batch-corrected matrices (one per
# method) and emits a single integrated matrix + concordance metrics.
# Cardinality: many on the input port flags scatter/gather to the
# composer.
inputs:
  - name: corrected_matrices
    semantic_type:
      kind: ontology_term
      iri: "data:3917"
      label: "Count matrix"
      ontology_version: "EDAM-1.25"
    physical_format:
      iri: "format:3475"
      label: "Tabular text"
    statistical_state: "normalized"
    cardinality:
      kind: many
    privacy_class: internal
outputs:
  - name: integrated_matrix
    semantic_type:
      kind: ontology_term
      iri: "data:3917"
      label: "Count matrix"
      ontology_version: "EDAM-1.25"
    physical_format:
      iri: "format:3475"
      label: "Tabular text"
    statistical_state: "normalized"
    privacy_class: internal
