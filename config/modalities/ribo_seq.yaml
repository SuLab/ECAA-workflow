semantic_equivalence_bounds:
  - metric: translation_efficiency_spearman_rho
    operator: ">="
    threshold: 0.90
    applies_to: "results/tables/te_*.csv"
    rationale: "Spearman correlation of per-gene translation efficiency scores ≥ 0.90 between runs"
  - metric: log2fc_abs_delta
    operator: "<="
    threshold: 0.05
    applies_to: "results/tables/de_*.csv"
    rationale: "DE log2FC delta ≤ 0.05 for translational-efficiency contrasts (looser than bulk due to RPF count sparsity)"
