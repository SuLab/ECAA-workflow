    modifiers:
      kind: strain_resolution

  # scATAC-only (no companion RNA modality). Routes through the
  # `generic_omics` fall-through to ensure the universal `raw_qc`
  # + `generic_summary` terminals are present even though the
  # single-cell ATAC pipeline has its own modality-specific outputs.
  - phrases:
      - "scatac only"
      - "scatac seq only"
      - "single cell atac alone"
      - "snatac only"
    edam_data: "data:0006"
    modifiers:
      kind: scatac_only
