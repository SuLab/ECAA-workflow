    modifiers:
      kind: gwas_coloc

  # Metagenomic strain-level resolution. Atypical-shape modality
  # (strain SNP calling on metagenomic shotgun) — routes through
  # the `generic_omics` fall-through so universal terminals are
  # emitted alongside any modality-specific outputs.
  - phrases:
      - "strain snp"
      - "strain-level"
      - "strain resolution"
      - "metagenomic strain"
