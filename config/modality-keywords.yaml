      - "go terms"
      - "reactome enrichment"
      - "reactome analysis"
      - "kegg enrichment"
      - "kegg analysis"
      - "msigdb"
      - "enriched pathways"
      - "biological pathways"
    edam_data: "data:0951"
    edam_format: "format:3475"
    modifiers:
      kind: enrichment

  # Peak calling for ChIP-seq / ATAC-seq. EDAM data:1255 =
  # "Feature record" (the parent term for genomic-region records like
  # peak sets); format:3003 = "BED". The v4 composer's
  # `peak_calling` atom declares its output port at
  # `data:1255 / format:3003` — keep this goal pattern aligned so the
  # backward search unifies with the atom's output IRI.
  #
  # `edam_data` here is `data:1255` (Feature record, the *output*
  # of peak calling), not `data:0863` (Sequence alignment / BAM,
  # the *input*). v4's port-based search requires the goal IRI to
  # match the atom's output port IRI, so the goal-pattern config
  # is the right place to fix the IRI — the goal is what the SME
  # asks for (a peak set), not what the atom consumes.
  - phrases:
      - "chip seq peaks"
      - "chip-seq peaks"
      - "atac seq peaks"
      - "atac-seq peaks"
      - "peak calls"
      - "peak calling"
      - "call peaks"
      - "macs2 peaks"
      - "macs3 peaks"
      - "macs2"
      - "macs3"
      - "narrow peaks"
      - "broad peaks"
      - "narrowpeak"
      - "broadpeak"
      - "bed file"
      - "bed output"
      - "open chromatin"
      - "accessible regions"
      - "transcription factor binding"
      - "tf binding sites"
      - "histone modifications"
      - "histone marks"
    edam_data: "data:1255"
    edam_format: "format:3003"
    modifiers:
      kind: peak_calling

