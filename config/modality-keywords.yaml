      - "label cells"
      - "label transfer"
      - "umap clustering"
      - "leiden clustering"
      - "louvain clustering"
      - "scrna clustering"
      - "marker gene"
      - "marker genes"
      - "scanpy"
      - "seurat"
      - "scvi"
      - "h5ad"
    edam_data: "data:3917"
    edam_format: "format:3590"
    modifiers:
      kind: scrnaseq_annotation

  # Pathway / functional enrichment.
  - phrases:
