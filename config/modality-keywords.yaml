  # spatial_transcriptomics archetype, not single_cell_de.
  - phrases:
      - "spatial transcriptomics"
      - "spatial analysis"
      - "spatial gene expression"
      - "visium"
      - "10x visium"
      - "slide-seq"
      - "merfish"
      - "stereo-seq"
      - "neighborhood analysis"
      - "tissue domain"
      - "spatial domain"
      - "spatial niche"
      - "spatial neighborhood"
      - "spot deconvolution"
      - "spatial autocorrelation"
      - "moran's i"
      - "morans i"
