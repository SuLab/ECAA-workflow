# Cross-cutting classifier rules.
#
# Per-modality definitions (id, keywords, EDAM IRIs, archetype routing)
# live in config/modalities/<id>.yaml and load via `ModalityRegistry`.
# `Classifier::load` rejects any `modalities:` block found here so the
# two sources cannot drift.

