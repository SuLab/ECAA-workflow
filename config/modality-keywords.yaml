      - "arima"
      - "arima forecast"
      - "prophet"
      - "prophet forecast"
      - "exponential smoothing"
      - "ets model"
      - "lstm forecast"
      - "anomaly detection"
      - "trend analysis"
      - "seasonal decomposition"
    edam_data: "data:0951"
    edam_format: "format:3475"
    modifiers:
      kind: forecast

  # Generic proteomics phrasing (no DDA/DIA hint).
  # Falls through to the proteomics modality without committing to
  # a sub-archetype; the composer surfaces `TieRequiresSmeDecision`
  # if both DDA + DIA archetypes match. Captures phrases that
  # don't disambiguate which proteomics method applies.
  - phrases:
      - "protein abundance"
      - "protein quantification"
      - "protein expression"
      - "phosphoproteomics"
      - "post translational modification"
      - "ptm analysis"
      - "phospho sites"
      - "ubiquitination sites"
    edam_data: "data:2976"
    edam_format: "format:3475"
    modifiers:
      kind: proteomics_quantification

  # Metagenomics taxonomic profiling goal. Distinct
  # from DE because the committed artifact is a taxonomic
  # abundance table (per-sample × per-taxon counts), not a per-
  # gene DE summary. Routes to metagenomics_taxonomic archetype.
  - phrases:
      - "metagenomic profiling"
      - "metagenomics analysis"
      - "taxonomic profiling"
      - "taxonomic classification"
      - "taxonomy assignment"
      - "microbiome analysis"
      - "microbiome composition"
      - "16s rrna"
      - "16s sequencing"
      - "amplicon sequencing"
      - "shotgun metagenomics"
      - "alpha diversity"
      - "beta diversity"
      - "kraken"
      - "kraken2"
      - "metaphlan"
      - "qiime"
      - "qiime2"
      - "dada2"
      - "otu table"
      - "asv table"
      - "abundance table"
      - "species composition"
      - "community composition"
    edam_data: "data:0951"
    edam_format: "format:3475"
    modifiers:
      kind: metagenomics_taxonomic

  # Spatial transcriptomics goal. Distinct artifact
