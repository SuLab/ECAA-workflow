data_source_patterns:
  - pattern: "GSE\\d+"
    label: NCBI GEO Series
  - pattern: "GSM\\d+"
    label: NCBI GEO Sample
  - pattern: "PRJNA\\d+"
    label: NCBI BioProject
  - pattern: "SRR\\d+"
    label: NCBI SRA Run
  - pattern: "SRP\\d+"
    label: NCBI SRA Project
  - pattern: "E-MTAB-\\d+"
    label: ArrayExpress
  - pattern: "PXD\\d+"
    label: ProteomeXchange
  - pattern: "EMPIAR-\\d+"
    label: EMPIAR (electron microscopy)
  - pattern: "EGAD\\d+"
    label: EGA Dataset
  - pattern: "PMID\\d+"
    label: PubMed citation
  - pattern: "PMC\\d+"
    label: PubMed Central article

# Keyword-path goal extraction. The classifier scans
# this list in order and the FIRST matching pattern populates
# `ClassificationResult.goal`. Phrases use the same normalize-for-
# match pipeline as `keywords`/`organism_keywords` (lowercase,
# hyphen + underscore -> space) so SME prose with various
# punctuation matches. EDAM IRIs follow the `data:N` /
# `format:N` ontology shorthand (with `swfc:N` reserved for our
# extensions per S4.8 / S4.9). Composer (S7.2) reads
# (edam_data, edam_format, modifiers) to seed backward chaining.
goal_patterns:
  # KNOWN-ISSUE / DOCUMENTATION: the three proteomics goal patterns
  # below (DDA / DIA / quantification) tag `edam_data: data:2976`.
  # Per the EDAM 1.25 ontology, `data:2976` is "Protein sequence"
  # (parent: data:2044 Sequence) — NOT a quantification / mass-spectrum
  # type. The correct goal IRI is probably `data:2603 Expression data`
  # for the input matrix or `data:0951 Statistical estimate score` for
  # the DE-style output. The mislabel works today because
  # `config/stage-atoms/protein_quantification.yaml` also declares
  # `edam_data: data:2976`, so the goal-reachability check passes via
  # exact-match. Fixing the IRI requires BOTH sides to change in
  # lockstep — atom + every proteomics archetype goal_data — otherwise
  # the proteomics scenarios start failing GoalUnreachable. Tracked as
  # a follow-up; do not silently rewrite either side.
  # Coverage is broadened so common SME phrasings trip a goal:
  # ~15-25 phrases per pattern, picking up colloquial + tool-name +
  # abbreviation variants that appear in real intake prose. Each
  # pattern still maps to a single (edam_data, edam_format) pair so
  # the archetype scoring stays deterministic.

  # Proteomics DDA/DIA goal patterns must come BEFORE
  # the generic DE pattern. Otherwise DE-keyword matches (fold change,
  # limma, log2 fold change) in a proteomics prompt fire the DE goal
  # (data:0951) and the DDA/DIA disambiguation never gets a chance.
  # The result was a goal_data=data:0951 vs archetype goal_data=data:2976
  # mismatch and the composer falling to the polluted search-only path.
  - phrases:
      - "dda analysis"
      - "dda proteomics"
      - "data dependent acquisition"
      - "tmt quantification"
      - "tmt labeling"
      - "itraq"
      - "ibaq"
      - "shotgun proteomics"
      - "fragpipe"
      - "maxquant"
      - "msfragger"
    edam_data: "data:2976"
    edam_format: "format:3475"
    modifiers:
      kind: proteomics_dda

  - phrases:
      - "dia analysis"
      - "dia proteomics"
      - "data independent acquisition"
      - "label free quantification"
      - "lfq"
      - "label-free quantification"
      - "diann"
      - "dia-nn"
      - "spectronaut"
      - "dia-umpire"
    edam_data: "data:2976"
    edam_format: "format:3475"
    modifiers:
      kind: proteomics_dia

  # Differential expression results are the most common SME ask
  # across bulk + single-cell. Tabular committed shape (DE
  # summary CSV / TSV); EDAM data:0951 = "statistical estimate
  # score"; EDAM format:3475 = "Tabular text".
  - phrases:
      - "differential expression"
      - "differential gene expression"
      - "differential transcript expression"
      - "differentially expressed"
      - "deg analysis"
      - "deg list"
      - "deg table"
      - "deg results"
      - "de analysis"
      - "de genes"
      - "deseq2"
      - "edger"
      - "limma voom"
      - "limma-voom"
      - "fold change"
      - "log2 fold change"
      - "logfc"
      - "upregulated genes"
      - "downregulated genes"
      - "compare gene expression"
      - "gene expression differences"
      - "differences in gene expression"
      - "expression differences"
      - "expression comparison"
      - "find differentially"
      - "identify de genes"
      - "transcriptomics and proteomics"
      - "gene expression and proteomics"
      - "rna seq and proteomics"
      - "rnaseq and proteomics"
      - "bulk rna seq and lc ms"
      - "shared signal analysis"
      - "formal convergence"
      - "formal convergence test"
      - "general overlap"
      - "overlap analysis"
      - "same direction dysregulation"
      # Methylation differential analysis emits the
      # same edam_data:0951 / edam_format:3475 goal triple (effect
      # size + adjusted p-value tabular table) as bulk RNA-seq DE.
      # Without these phrases the methylation classifier hit modality
      # match but produced goal=null, causing the composer fast-path
      # to refuse to build the DAG.
      - "differentially methylated"
      - "differentially methylated positions"
      - "differentially methylated regions"
      - "dmp analysis"
      - "dmp detection"
      - "dmr analysis"
      - "dmr detection"
      - "dmr calling"
      - "dmrcate"
      - "methylkit"
      - "minfi"
      - "bsseq"
      - "methylpy"
      - "dmrseq"
      - "methylseq"
      - "differential methylation analysis"
      # CUT&Tag, ChIP-exo, HiChIP, STARR-seq, single-
      # cell V(D)J, immunopeptidomics, ribo-seq, long-read RNA-seq,
      # spatial-transcriptomics differential-analysis phrases. All
      # emit the same effect-size + p-value tabular goal triple.
      - "differential peaks"
      - "differential peak calling"
      - "differential accessibility"
      - "differential binding"
      - "differential loop calling"
      - "differential loops"
      - "differential clonotype"
      - "differential repertoire"
      - "differential presentation"
      - "differential translation efficiency"
      - "differential isoform usage"
      - "differential transcript usage"
      - "differential transcript usage analysis"
      - "differential layer composition"
      - "differential cell-type abundance"
    edam_data: "data:0951"
    edam_format: "format:3475"
    modifiers:
      kind: differential_expression

  # Variant calls (VCF). Common across cancer + GWAS + clinical
  # genomics. EDAM data:3498 = "Sequence variations"; EDAM
  # format:3016 = "VCF".
  - phrases:
      - "variant calls"
      - "variant calling"
      - "germline variants"
      - "germline calling"
      - "somatic variants"
      - "somatic calling"
      - "snv calling"
      - "snv detection"
      - "indel calling"
      - "small variant"
      - "vcf output"
      - "vcf file"
      - "call variants"
      - "haplotypecaller"
      - "deepvariant"
      - "strelka"
      - "mutect"
      - "gatk variant"
      - "freebayes"
      - "find mutations"
      - "identify mutations"
    edam_data: "data:3498"
    edam_format: "format:3016"
    modifiers:
      kind: variant_calling

  # Annotated single-cell AnnData (the lotz IVD pattern). EDAM
