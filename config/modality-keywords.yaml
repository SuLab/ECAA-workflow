  # Long-read isoform discovery / DTU goal.
  # Distinguishes from short-read DE (data:0951) because the
  # committed artifact is per-isoform usage stats. Routes to
  # long_read_rnaseq archetype.
  - phrases:
      - "isoform discovery"
      - "isoform usage"
      - "differential transcript usage"
      - "dtu analysis"
      - "long read rnaseq"
      - "long-read rnaseq"
      - "long-read sequencing"
      - "pacbio iso-seq"
      - "iso-seq"
      - "isoseq"
      - "nanopore rnaseq"
      - "oxford nanopore"
      - "alternative splicing"
      - "splice variants"
      - "novel isoforms"
      - "transcript isoforms"
