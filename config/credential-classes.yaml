# Credential classes for `UnblockPath::Waiver` and
# `UnblockPath::EscalateToReviewer`.
#
# Each class names a role that can sign off on a waiver / escalation.
# `audit_required: true` directs the server to write a sign-off entry
# to the decision log; `requires_co_signature` enforces additional
# signers before the waiver is honored.
#
# Loaded by the unblock-path dispatch endpoint to authorize a waiver
# / escalation request against the SME's claimed credentials. Schema
# sidecar in `config/_credential-classes.schema.json`.
version: "1.0.0"
classes:
  - id: bioinformatics_lead
    description: "Bioinformatics group lead; may waive scientifically-risky technical decisions."
    audit_required: true
  - id: clinical_lead
    description: "Clinical lead; may waive clinical-gate refusals when paired with regulatory artifacts."
    audit_required: true
    requires_co_signature:
      - regulatory_officer
  - id: regulatory_officer
    description: "Regulatory officer; required co-signer for clinical waivers."
    audit_required: true
  - id: privacy_officer
    description: "Privacy officer; may waive controlled-access flags under documented procedure."
    audit_required: true
  - id: domain_expert
    description: "Domain SME approval recorded against the WRROC."
    audit_required: false
  - id: validation_engineer
    description: "Engineer approval for validation contract correctness."
    audit_required: false
