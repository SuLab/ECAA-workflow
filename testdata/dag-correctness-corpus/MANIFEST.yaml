- id: chip-exo-rhee-pugh-yeast
  tier: A
  archetype: chip_exo_peaks
  modality: chip_exo
  blinded_prompt: 'We did ChIP-exo on a handful of sequence-specific transcription

    factors in S. cerevisiae — single-end short reads, lambda

    exonuclease digestion to trim the immunoprecipitated DNA back to

    the protein-DNA crosslink. Each TF has two biological

    replicates plus matched input controls. Need to align against

    sacCer3, call peaks accounting for the near-nucleotide-resolution

    footprint (the standard MACS2 settings will be too permissive on

    the boundary — please use a ChIP-exo-aware caller or

    ChIP-exo-tuned settings), and report binding-site coordinates

    with high precision. Compare per-TF binding profiles against the

    input control and across TFs, then surface enriched promoter

    contexts.

    '
  expected_dag:
    required_atoms:
    - data_acquisition
    - raw_qc
    - sequence_trimming
    - alignment
    - peak_calling
    - motif_enrichment
    - reporting
