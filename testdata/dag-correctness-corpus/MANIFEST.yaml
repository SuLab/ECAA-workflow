schema_version: '0.1'
generated_at: '2026-05-17'
description: 'Blinded DAG-correctness corpus for the ecaa-workflow composer.

  Each entry pairs a well-known publication with a blinded SME-style

  prompt and a machine-checkable expected-DAG specification. Used by

  the evaluation harness to verify the compiler emits the right atoms

  + the right shape for the right biological question, without the

  LLM being able to identify the source publication.


  Blinding contract: every `blinded_prompt` is scrubbed of author names,

  paper titles, journal names, PMIDs / DOIs, repository accession IDs

  (GEO, SRA, ENA, PRIDE, dbGaP), uniquely-identifying sample counts,

  cohort fingerprints (TCGA, GTEx, CPTAC, ENCODE, etc.), institute

  names, publication years, and paper-specific tool-version pins. The

  prompt MAY name the modality, platform, organism, reference genome,

  approximate sample size (rounded), and the standard deliverable

  vocabulary an SME would use in chat.


  Ground-truth `expected_dag` blocks are written against the live atom

  catalog (config/stage-atoms/) and archetype shapes

  (config/archetypes/) so the evaluation harness can diff the emitted

  WORKFLOW.json against the required / optional / forbidden atom set.

  '
tier_a_per_archetype_min: 2
tier_b_flexibility_target: 8
scenarios:
- id: atac-buenrostro-immune-lineage
  tier: A
  archetype: atac_seq_peaks
  modality: atac_seq
  blinded_prompt: 'We have bulk ATAC-seq FASTQs from sorted human hematopoietic

    progenitor populations — roughly a dozen cell-type populations

    with two to three replicates each, all from healthy donor bone

    marrow. Reads are 50 bp paired-end. We want to map them against

    GRCh38, call open-chromatin peaks per population, build a union

    peak set, and then ask which peaks differ in accessibility

    between the early progenitor pool and the lineage-committed

    pools. Standard outputs would help — per-sample QC, the BED

    files of called peaks, a master peak-by-sample matrix, a

    differential-accessibility table with log2 fold change and

    adjusted p-value, motif enrichment under the differential peaks,

    and a peak-to-gene annotation against the nearest TSS. We do

    not have matched RNA-seq for this cohort.

    '
  expected_dag:
    required_atoms:
    - data_acquisition
    - raw_qc
    - sequence_trimming
    - alignment
    - peak_calling
    - peak_annotation
    - differential_accessibility
    - motif_enrichment
    - reporting
    - final_reporting
    optional_atoms:
    - review_prior_work
    - contextualize_findings_with_literature
    forbidden_atoms:
    - quantification
    - differential_expression
    - cell_type_annotation
    - clustering
    - dimensionality_reduction
    expected_modality: atac_seq
    min_task_count: 15
    max_task_count: 40
    structural_constraints:
    - peak_calling depends transitively on alignment
    - differential_accessibility depends transitively on peak_calling
    - motif_enrichment depends on differential_accessibility OR peak_calling
    - reporting consumes differential_accessibility + motif_enrichment + peak_annotation
    - no clustering or dimensionality_reduction tasks emitted
- id: atac-corces-pancancer
  tier: A
  archetype: atac_seq_peaks
  modality: atac_seq
  blinded_prompt: 'I have ATAC-seq libraries from a few hundred primary solid-tumor

    samples spanning around twenty tumor types — fresh-frozen tissue,

    Omni-ATAC protocol, paired-end. The goal is a pan-cancer

    accessibility atlas. Concretely: per-sample QC and fragment-size

    QC, alignment against GRCh38, peak calling per sample, a union

    peak set across the cohort, a peak-by-sample accessibility

    matrix, and per-tumor-type differential accessibility against

    the rest of the cohort. We also want motif enrichment under the

    tumor-type-defining peaks and annotation of peaks against the

    nearest gene. No paired RNA-seq is required as input; this is

    pure chromatin-side analysis.

    '
  expected_dag:
    required_atoms:
    - data_acquisition
    - raw_qc
    - sequence_trimming
    - alignment
    - peak_calling
    - peak_annotation
    - differential_accessibility
    - motif_enrichment
    - reporting
    - final_reporting
    optional_atoms:
    - review_prior_work
    - contextualize_findings_with_literature
    forbidden_atoms:
    - quantification
    - differential_expression
    - cell_type_annotation
    - clustering
    - taxonomic_classification
    expected_modality: atac_seq
    min_task_count: 15
    max_task_count: 40
    structural_constraints:
    - alignment precedes peak_calling
    - differential_accessibility and motif_enrichment both feed reporting
    - no RNA quantification atom emitted
- id: bulk-rnaseq-recount3-airway
  tier: A
  archetype: bulk_rnaseq_de
  modality: bulk_rnaseq
  blinded_prompt: 'We''ve got bulk RNA-seq FASTQs from primary human airway smooth-

    muscle cells, four donors, each treated with a glucocorticoid

    agonist and an untreated vehicle control. So roughly eight to

    sixteen libraries total, paired-end, polyA-selected. Reference

    should be GRCh38 with GENCODE annotation. We want the standard

    RNA-seq DE pipeline — FastQC and adapter trimming, splice-aware

    alignment, gene-level counts, DESeq2-style normalization, and

    then a differential expression test of treated versus vehicle.

    Please give me the volcano plot, top up-/down-regulated genes,

    a PCA of samples, and pathway / GO enrichment on the ranked

    gene list. Standard adjusted-p-value cutoff is fine.

    '
  expected_dag:
    required_atoms:
    - data_acquisition
    - raw_qc
    - sequence_trimming
    - alignment
    - quantification
    - qc_preprocessing
    - normalisation
    - differential_expression
    - pathway_enrichment
    - reporting
    - final_reporting
    optional_atoms:
