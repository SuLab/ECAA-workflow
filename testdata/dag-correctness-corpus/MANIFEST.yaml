    parathyroid adenoma cell cultures, four donors. Each donor''s

    cells were exposed to estradiol, an estrogen-receptor agonist,

    and a vehicle control, with measurements at two time points

    after exposure. So a small sample size — under twenty libraries

    total — but a 2 by 2 factorial design. Align to GRCh38, get

    gene-level counts, normalize, and test for differential

    expression for the treatment effect with time as a covariate.

    A PCA, a volcano plot, the top DE-gene table, and pathway

    enrichment on the ranked list are the deliverables we need.

