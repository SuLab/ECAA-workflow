  tier: A
  archetype: clinical_trial_analysis
  modality: null
  blinded_prompt: 'We have CDISC ADaM-format trial data from a large open-label

    randomized trial of a corticosteroid versus standard of care in

    hospitalized adults with a viral respiratory infection. Several

    thousand participants per arm. Primary endpoint is 28-day

    all-cause mortality; key secondary endpoints are time to hospital

    discharge and progression to invasive mechanical ventilation

    among those not on it at randomization. Pre-specified subgroups

    are by respiratory-support level at baseline. Need the standard

    SAP-driven analysis: primary endpoint estimate with confidence

    interval, the secondary-endpoint readouts with multiplicity

    adjustment, the safety summary table, the subgroup forest plot,

    and the sensitivity analysis under the per-protocol population.

    '
