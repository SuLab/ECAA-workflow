    - peak_annotation
    forbidden_atoms:
    - quantification
    - differential_expression
    - variant_calling
    - cell_type_annotation
    - taxonomic_classification
    expected_modality: chip_exo
    min_task_count: 14
    max_task_count: 36
    structural_constraints:
    - peak_calling depends transitively on alignment
    - motif_enrichment depends on peak_calling
    - reporting consumes peak_calling + motif_enrichment
