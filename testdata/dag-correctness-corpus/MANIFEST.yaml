- id: perturb-seq-dixit-2016
  tier: A
  archetype: crispr_screen_scrnaseq
  modality: crispr_screen_scrnaseq
  blinded_prompt: 'We''ve run a pooled CRISPR-cas9 knockout screen in mouse bone-

    marrow derived dendritic cells with a 10x Chromium scRNA-seq

    readout and a parallel feature-barcode library encoding the

    sgRNA in each cell. About two dozen targeted transcription

    factors plus non-targeting control sgRNAs. Need the standard

    Perturb-seq pipeline: per-cell gene quantification AND per-cell

    sgRNA assignment from the feature-barcode reads, standard

    scRNA-seq QC and normalization, clustering and a UMAP, then

    per-perturbation pseudobulk differential expression versus the

    non-targeting control cells. The deliverable we care about is a

    per-perturbation effect score on the transcriptome plus the

    gene-level DE tables. Reference is mm10.

    '
  expected_dag:
    required_atoms:
    - data_acquisition
    - raw_qc
    - alignment
    - quantification
    - sgrna_assignment
    - qc_preprocessing
    - normalisation
    - dimensionality_reduction
    - clustering
    - differential_expression
    - reporting
    - final_reporting
    optional_atoms:
    - sequence_trimming
    - pathway_enrichment
    forbidden_atoms:
    - peak_calling
    - variant_calling
    - taxonomic_classification
    - vdj_reconstruction
    - share_seq_barcode_match
    - multiome_arc_demultiplex
    expected_modality: crispr_screen_scrnaseq
    min_task_count: 21
    max_task_count: 54
    structural_constraints:
    - sgrna_assignment present and feeds differential_expression
    - clustering and dimensionality_reduction both present
    - differential_expression depends on sgrna_assignment AND normalisation
