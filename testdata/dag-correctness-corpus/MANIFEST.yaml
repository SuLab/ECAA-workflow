    - contextualize_findings_with_literature
    forbidden_atoms:
    - peak_calling
    - variant_calling
    - taxonomic_classification
    - clustering
    - cell_type_annotation
    expected_modality: bulk_rnaseq
    min_task_count: 20
    max_task_count: 50
    structural_constraints:
    - differential_expression depends transitively on normalisation
    - pathway_enrichment depends on differential_expression
    - no peak-calling or variant-calling tasks emitted
