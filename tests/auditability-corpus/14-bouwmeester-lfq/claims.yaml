schema_version: "0.1"
study_id: "14-bouwmeester-lfq"
claims:
  - id: "14-bouwmeester-lfq-claim-001"
    text: "Proteins quantified per LC-MS run (≥2 peptides, 1% FDR): ≥ 3,500"
    contract: thresholded_de_or_enrichment
    source_table: "results/tables/qc.csv"
    expected_value: 3500
    tolerance: 0.1
  - id: "14-bouwmeester-lfq-claim-002"
    text: "Yeast log2(B/A) median within ±0.32 of designed -1.0 (observed -1.32 to -0.68)"
    contract: numeric_table_lookup
    source_table: "results/tables/qc.csv"
    expected_value: -1.0
    tolerance: 0.32
  - id: "14-bouwmeester-lfq-claim-003"
    text: "E. coli log2(B/A) median within ±0.32 of designed +2.0 (observed +1.68 to +2.32)"
    contract: numeric_table_lookup
    source_table: "results/tables/qc.csv"
    expected_value: 2.0
    tolerance: 0.32
  - id: "14-bouwmeester-lfq-claim-004"
    text: "Human log2(B/A) median within ±0.10 of designed 0.0 (constant background)"
    contract: numeric_table_lookup
    source_table: "results/tables/qc.csv"
    expected_value: 0.0
    tolerance: 0.10
  - id: "14-bouwmeester-lfq-claim-005"
    text: "Per-protein CV on human background (technical replicates) < 20% median"
    contract: numeric_table_lookup
    source_table: "results/tables/qc.csv"
    expected_value: 0.20
    tolerance: 0.05
  - id: "14-bouwmeester-lfq-claim-006"
    text: "Peptide-level FDR ≤ 1%"
    contract: thresholded_de_or_enrichment
    source_table: "results/tables/qc.csv"
    expected_value: 0.01
    tolerance: 0.005
  - id: "14-bouwmeester-lfq-claim-007"
    text: "Protein-group FDR ≤ 1%"
    contract: thresholded_de_or_enrichment
    source_table: "results/tables/qc.csv"
    expected_value: 0.01
    tolerance: 0.005
  - id: "14-bouwmeester-lfq-claim-008"
    text: "Peak-group / precursor q-value ≤ 1%"
    contract: thresholded_de_or_enrichment
    source_table: "results/tables/qc.csv"
    expected_value: 0.01
    tolerance: 0.005
  - id: "14-bouwmeester-lfq-claim-009"
    text: "RT-alignment median residual across instruments ≤ 30 s on a 60-min gradient"
    contract: numeric_table_lookup
    source_table: "results/tables/qc.csv"
    expected_value: 30
    tolerance: 0.1
  - id: "14-bouwmeester-lfq-claim-010"
    text: "iRT regression R² ≥ 0.99"
    contract: numeric_table_lookup
    source_table: "results/tables/qc.csv"
    expected_value: 0.99
    tolerance: 0.01
  - id: "14-bouwmeester-lfq-claim-011"
    text: "Emitted workflow contains stage 'discover_quantification': DIA-NN / OpenSWATH library-based quantification across DDA / DIA / TMT runs"
    contract: categorical
    source_table: "WORKFLOW.json"
    expected_value: "discover_quantification"
    tolerance: null
  - id: "14-bouwmeester-lfq-claim-012"
    text: "Emitted workflow contains stage 'quality_control': FastQC equivalent on raw spectra + MaxQuant/MSstats summary"
    contract: categorical
    source_table: "WORKFLOW.json"
    expected_value: "quality_control"
    tolerance: null
