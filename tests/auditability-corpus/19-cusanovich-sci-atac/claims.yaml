schema_version: "0.1"
study_id: "19-cusanovich-sci-atac"
claims:
  - id: "19-cusanovich-sci-atac-claim-001"
    text: "Cell-type cluster ARI vs published 85-cluster assignment (Cusanovich 2018 Suppl Table 4): ≥ 0.80"
    contract: group_comparison
    source_table: "results/tables/clusters.csv"
    expected_value: 0.80
    tolerance: 0.05
  - id: "19-cusanovich-sci-atac-claim-002"
    text: "Marker-TF motif Spearman ρ vs published chromVAR z-scores per cluster: ≥ 0.85"
    contract: group_comparison
    source_table: "results/tables/motif_enrichment.csv"
    expected_value: 0.85
    tolerance: 0.05
  - id: "19-cusanovich-sci-atac-claim-003"
    text: "LSI top-50-component RV-coefficient vs published embedding: ≥ 0.9"
    contract: rank_top_n
    source_table: "results/tables/qc.csv"
    expected_value: 0.9
    tolerance: 0.05
  - id: "19-cusanovich-sci-atac-claim-004"
    text: "Cells retained after QC within ±2% of ~100,000 (Cusanovich 2018 main text)"
    contract: numeric_table_lookup
    source_table: "results/tables/qc.csv"
    expected_value: 100000
    tolerance: 0.02
  - id: "19-cusanovich-sci-atac-claim-005"
    text: "Cluster count after resolution sweep within 80-90 (target 85, Suppl Table 4)"
    contract: categorical
    source_table: "results/tables/clusters.csv"
    expected_value: 85
    tolerance: 0.1
  - id: "19-cusanovich-sci-atac-claim-006"
    text: "Marker TF HNF4 enriched in hepatocyte cluster"
    contract: group_comparison
    source_table: "results/tables/motif_enrichment.csv"
    expected_value: "HNF4"
    tolerance: null
  - id: "19-cusanovich-sci-atac-claim-007"
