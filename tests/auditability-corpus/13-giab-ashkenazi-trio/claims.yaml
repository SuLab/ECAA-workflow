schema_version: "0.1"
study_id: "13-giab-ashkenazi-trio"
claims:
  - id: "13-giab-ashkenazi-trio-claim-001"
    text: "Trio sample-relatedness check passes: yes (kinship coefficient ~0.25 parent-child)"
    contract: numeric_table_lookup
    source_table: "results/tables/variants.csv"
    expected_value: 0.25
    tolerance: 0.05
  - id: "13-giab-ashkenazi-trio-claim-002"
    text: "GIAB SNV recall (germline truth): ≥ 0.99"
    contract: numeric_table_lookup
    source_table: "results/tables/variants.csv"
    expected_value: 0.99
    tolerance: 0.05
  - id: "13-giab-ashkenazi-trio-claim-003"
    text: "GIAB indel recall (germline truth): ≥ 0.92 (HaplotypeCaller-typical; DeepVariant typically reaches ≥ 0.96)"
    contract: numeric_table_lookup
    source_table: "results/tables/variants.csv"
    expected_value: 0.92
    tolerance: 0.05
  - id: "13-giab-ashkenazi-trio-claim-004"
    text: "Mendelian error rate (post-filtration): ≤ 0.5% of variants"
    contract: numeric_table_lookup
    source_table: "results/tables/variants.csv"
    expected_value: 0.005
    tolerance: 0.05
  - id: "13-giab-ashkenazi-trio-claim-005"
    text: "Spike-in recall in top-50 prioritized: ≥ 95%"
    contract: rank_top_n
    source_table: "results/tables/variants.csv"
    expected_value: 0.95
    tolerance: 0.05
  - id: "13-giab-ashkenazi-trio-claim-006"
    text: "Spike-in recall in top-10 prioritized: ≥ 80%"
    contract: rank_top_n
    source_table: "results/tables/variants.csv"
    expected_value: 0.8
    tolerance: 0.05
