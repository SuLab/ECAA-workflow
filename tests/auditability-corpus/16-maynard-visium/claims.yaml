  - id: "16-maynard-visium-claim-001"
    text: "Spots loaded (spatialLIBD SPE header): 47,681"
    contract: numeric_table_lookup
    source_table: "results/tables/qc.csv"
    expected_value: 47681
    tolerance: 0.01
  - id: "16-maynard-visium-claim-002"
    text: "Annotated spots (layer_guess_reordered): ≥ 47,329 (99.26%)"
    contract: numeric_table_lookup
    source_table: "results/tables/qc.csv"
    expected_value: 47329
    tolerance: 0.01
