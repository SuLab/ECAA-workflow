claims:
  - id: "06-tcga-brca-rnaseq-claim-001"
    text: "Fig 1B (peak distribution by region): counts in same proportions as paper"
    contract: numeric_table_lookup
    source_table: "results/tables/de.csv"
    expected_value: "counts in same proportions as paper"
    tolerance: null
  - id: "06-tcga-brca-rnaseq-claim-002"
    text: "Fig 1B (peak count): 27,156 / 39,207 active enhancers; 9,896 / 10,663 active promoters"
    contract: numeric_table_lookup
    source_table: "results/tables/de.csv"
    expected_value: 27156
    tolerance: 0.1
  - id: "06-tcga-brca-rnaseq-claim-003"
    text: "Fig 1C (saturation): 80% saturation < 40 samples; 90% at ~50 samples (paper text)"
    contract: numeric_table_lookup
    source_table: "results/tables/de.csv"
    expected_value: 0.8
    tolerance: 0.05
  - id: "06-tcga-brca-rnaseq-claim-004"
    text: "Fig 1D (volcano): 2,226 up / 1,979 down at |log2FC|>1, padj<1e-5"
    contract: thresholded_de_or_enrichment
    source_table: "results/tables/de.csv"
    expected_value: 2226
    tolerance: 0.1
  - id: "06-tcga-brca-rnaseq-claim-005"
    text: "Fig 1F (overlap): 18,477 unique to ours / 24,652 shared / 11,796 unique to Cohen"
    contract: numeric_table_lookup
    source_table: "results/tables/de.csv"
    expected_value: 18477
    tolerance: 0.1
  - id: "06-tcga-brca-rnaseq-claim-006"
    text: "Fig 2A (heatmap): 5,590 gain / 1,100 lost VELs (= 6,690 total significant VELs at recurrence ≥14 / ≥19)"
    contract: numeric_table_lookup
    source_table: "results/tables/de.csv"
    expected_value: 5590
    tolerance: 0.1
  - id: "06-tcga-brca-rnaseq-claim-007"
    text: "Fig 2B (recurrence curve): hits 95% at recurrence ≥14 (gain) and ≥19 (lost)"
    contract: numeric_table_lookup
    source_table: "results/tables/de.csv"
    expected_value: 0.95
    tolerance: 0.05
  - id: "06-tcga-brca-rnaseq-claim-008"
    text: "Fig 2D (GREAT): colon adenocarcinoma, large intestine adenocarcinoma, gastrointestinal neoplasm at top"
    contract: numeric_table_lookup
