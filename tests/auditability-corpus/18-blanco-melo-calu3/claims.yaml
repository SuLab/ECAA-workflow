schema_version: "0.1"
study_id: "18-blanco-melo-calu3"
claims:
  - id: "18-blanco-melo-calu3-claim-001"
    text: "Total raw reads per sample (GSE147507 metadata): 25-60 million"
    contract: numeric_table_lookup
    source_table: "results/tables/qc.csv"
    expected_value: 40000000
    tolerance: 0.5
  - id: "18-blanco-melo-calu3-claim-002"
    text: "STAR alignment rate to GRCh38 (lower than typical; viral RNA in infected arm): ≥ 70%"
    contract: group_comparison
    source_table: "results/tables/qc.csv"
    expected_value: 0.70
    tolerance: 0.1
  - id: "18-blanco-melo-calu3-claim-003"
    text: "Viral-read fraction (infected arm, derived): 5-35% reads unaligned to host"
    contract: numeric_table_lookup
    source_table: "results/tables/qc.csv"
    expected_value: 0.20
    tolerance: 0.5
  - id: "18-blanco-melo-calu3-claim-004"
    text: "DEGs at FDR<0.05 AND |log2FC|>2 (DESeq2 LRT, stringent primary floor): ≥ 460"
    contract: thresholded_de_or_enrichment
    source_table: "results/tables/de_results.csv"
    expected_value: 460
    tolerance: 0.2
  - id: "18-blanco-melo-calu3-claim-005"
    text: "DEGs at FDR<0.05 only (no FC gate, secondary): ≥ 1,000"
    contract: thresholded_de_or_enrichment
    source_table: "results/tables/de_results.csv"
    expected_value: 1000
    tolerance: 0.2
  - id: "18-blanco-melo-calu3-claim-006"
    text: "MSigDB Jaccard vs BLANCO_MELO_COVID19_SARS_COV_2_INFECTION_CALU3_CELLS_UP (up-set): ≥ 0.80"
    contract: group_comparison
    source_table: "results/tables/enrichment.csv"
    expected_value: 0.80
    tolerance: 0.05
  - id: "18-blanco-melo-calu3-claim-007"
