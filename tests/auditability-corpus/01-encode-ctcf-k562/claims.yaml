schema_version: "0.1"
study_id: "01-encode-ctcf-k562"
claims:
  - id: "01-encode-ctcf-k562-claim-001"
    text: "Mapped reads per replicate (post-filter): ≥ 20M usable fragments"
    contract: numeric_table_lookup
    source_table: "results/tables/qc.csv"
    expected_value: "≥ 20M usable fragments"
    tolerance: null
  - id: "01-encode-ctcf-k562-claim-002"
    text: "NSC (rep1, rep2): ≥ 1.05"
    contract: numeric_table_lookup
    source_table: "results/tables/qc.csv"
    expected_value: 1.05
    tolerance: 0.1
  - id: "01-encode-ctcf-k562-claim-003"
    text: "RSC (rep1, rep2): ≥ 0.8"
    contract: numeric_table_lookup
    source_table: "results/tables/qc.csv"
    expected_value: 0.8
    tolerance: 0.05
  - id: "01-encode-ctcf-k562-claim-004"
    text: "FRiP: ≥ 0.05"
    contract: numeric_table_lookup
    source_table: "results/tables/qc.csv"
    expected_value: 0.05
    tolerance: 0.05
  - id: "01-encode-ctcf-k562-claim-005"
    text: "NRF: ≥ 0.9"
    contract: numeric_table_lookup
    source_table: "results/tables/qc.csv"
    expected_value: 0.9
    tolerance: 0.05
  - id: "01-encode-ctcf-k562-claim-006"
    text: "IDR-thresholded peak count (idr<0.05): within ±15% of ENCFF843VHC (GRCh38 default) or ENCFF002DDJ (hg19 default) released peak count (~40k–50k peaks)"
    contract: numeric_table_lookup
    source_table: "results/tables/qc.csv"
    expected_value: 0.15
    tolerance: 0.15
  - id: "01-encode-ctcf-k562-claim-007"
    text: "Peak overlap with released peak set: Jaccard ≥ 0.85"
    contract: numeric_table_lookup
    source_table: "results/tables/qc.csv"
    expected_value: 0.85
    tolerance: 0.05
  - id: "01-encode-ctcf-k562-claim-008"
    text: "Top de novo motif: JASPAR MA0139.1 (CTCF) E < 1e-100"
    contract: numeric_table_lookup
    source_table: "results/tables/qc.csv"
    expected_value: 100
    tolerance: 0.1
  - id: "01-encode-ctcf-k562-claim-009"
    text: "Genomic distribution: enriched in introns + intergenic, ~5% promoter"
    contract: group_comparison
    source_table: "results/tables/qc.csv"
    expected_value: 0.05
    tolerance: 0.05
  - id: "01-encode-ctcf-k562-claim-010"
    text: "Emitted workflow contains stage 'data_acquisition': pull ENCSR000DWE's two FASTQ replicates +"
    contract: categorical
    source_table: "WORKFLOW.json"
    expected_value: "data_acquisition"
    tolerance: null
  - id: "01-encode-ctcf-k562-claim-011"
    text: "Emitted workflow contains stage 'quality_control': FastQC (per file) + MultiQC summary"
    contract: categorical
    source_table: "WORKFLOW.json"
    expected_value: "quality_control"
    tolerance: null
  - id: "01-encode-ctcf-k562-claim-012"
    text: "Emitted workflow contains stage 'discover_alignment': BWA (single-end) against GRCh38 with"
    contract: categorical
    source_table: "WORKFLOW.json"
    expected_value: "discover_alignment"
    tolerance: null
